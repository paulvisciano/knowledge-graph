# ═══════════════════════════════════════════════════════════════════════════════
# Knowledge Graph — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
# Usage:
#   docker compose up -d          — start full stack
#   docker compose logs -f        — follow logs
#   docker compose down           — stop
#
# Config:
#   Single .env file at project root — no separate lightrag/.env needed.
#   cp .env.example .env   then customize.
#
# Prerequisites:
#   llama-server processes running on host (ports 8080, 8081, 8082)
#
# Storage:
#   PostgreSQL for KV, Vector, and DocStatus stores.
#   NetworkX for Graph storage (no AGE extension needed).
#   To switch to file-based storage, remove the LIGHTRAG_*_STORAGE vars
#   from .env and the defaults (JsonKVStorage, NanoVectorDBStorage, etc.) apply.
# ═══════════════════════════════════════════════════════════════════════════════

services:
  lightrag:
    build:
      context: ./lightrag
      dockerfile: Dockerfile
    container_name: knowledge-graph-lightrag
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LIGHTRAG_PORT:-9621}:9621"
    volumes:
      - lightrag_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOST: "${LIGHTRAG_HOST:-0.0.0.0}"
      PORT: "9621"
      WEBUI_TITLE: "${LIGHTRAG_WEBUI_TITLE:-My Graph KB}"
      WEBUI_DESCRIPTION: "${LIGHTRAG_WEBUI_DESCRIPTION:-Simple and Fast Graph Based RAG System}"
      WORKING_DIR: "${WORKING_DIR:-/app/data/rag_storage}"
      INPUT_DIR: "${INPUT_DIR:-/app/data/inputs}"
      LLM_BINDING: "${LLM_BINDING:-openai}"
      LLM_MODEL: "${LLM_MODEL:-Gemma-4-12B-OBLITERATED-Q4_K_M}"
      LLM_BINDING_HOST: "${LLM_BINDING_HOST:-http://host.docker.internal:8080}"
      LLM_BINDING_API_KEY: "${LLM_BINDING_API_KEY:-llama-server}"
      QUERY_LLM_MODEL: "${QUERY_LLM_MODEL:-Gemma-4-12B-OBLITERATED-Q4_K_M}"
      QUERY_LLM_BINDING: "${QUERY_LLM_BINDING:-openai}"
      QUERY_LLM_BINDING_HOST: "${QUERY_LLM_BINDING_HOST:-http://host.docker.internal:8080}"
      QUERY_LLM_BINDING_API_KEY: "${QUERY_LLM_BINDING_API_KEY:-llama-server}"
      EXTRACT_OPENAI_LLM_TEMPERATURE: "${EXTRACT_OPENAI_LLM_TEMPERATURE:-0.1}"
      EXTRACT_OPENAI_LLM_MAX_TOKENS: "${EXTRACT_OPENAI_LLM_MAX_TOKENS:-2048}"
      QUERY_OPENAI_LLM_TEMPERATURE: "${QUERY_OPENAI_LLM_TEMPERATURE:-0.7}"
      QUERY_OPENAI_LLM_MAX_TOKENS: "${QUERY_OPENAI_LLM_MAX_TOKENS:-1024}"
      ENTITY_EXTRACTION_USE_JSON: "${ENTITY_EXTRACTION_USE_JSON:-true}"
      OLLAMA_EMULATING_MODEL_TAG: "${OLLAMA_EMULATING_MODEL_TAG:-latest}"
      EMBEDDING_BINDING: "${EMBEDDING_BINDING:-openai}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-bge-m3-Q4_K_M}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-1024}"
      EMBEDDING_BINDING_HOST: "${EMBEDDING_BINDING_HOST:-http://host.docker.internal:8081}"
      EMBEDDING_BINDING_API_KEY: "${EMBEDDING_BINDING_API_KEY:-llama-server}"
      RERANK_BINDING: "${RERANK_BINDING:-jina}"
      RERANK_MODEL: "${RERANK_MODEL:-bge-reranker-v2-m3-Q4_K_M}"
      RERANK_BINDING_HOST: "${RERANK_BINDING_HOST:-http://host.docker.internal:8082/v1/rerank}"
      RERANK_BINDING_API_KEY: "${RERANK_BINDING_API_KEY:-llama-server}"
      RERANK_BY_DEFAULT: "${RERANK_BY_DEFAULT:-true}"
      MIN_RERANK_SCORE: "${MIN_RERANK_SCORE:--1}"
      VLM_PROCESS_ENABLE: "${VLM_PROCESS_ENABLE:-true}"
      VLM_LLM_BINDING: "${VLM_LLM_BINDING:-openai}"
      VLM_LLM_MODEL: "${VLM_LLM_MODEL:-Gemma-4-12B-OBLITERATED-Q4_K_M}"
      VLM_LLM_BINDING_HOST: "${VLM_LLM_BINDING_HOST:-http://host.docker.internal:8080}"
      VLM_LLM_BINDING_API_KEY: "${VLM_LLM_BINDING_API_KEY:-llama-server}"
      LIGHTRAG_KV_STORAGE: "${LIGHTRAG_KV_STORAGE:-PGKVStorage}"
      LIGHTRAG_VECTOR_STORAGE: "${LIGHTRAG_VECTOR_STORAGE:-PGVectorStorage}"
      LIGHTRAG_GRAPH_STORAGE: "${LIGHTRAG_GRAPH_STORAGE:-NetworkXStorage}"
      LIGHTRAG_DOC_STATUS_STORAGE: "${LIGHTRAG_DOC_STATUS_STORAGE:-PGDocStatusStorage}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_USER: "${POSTGRES_USER:-lightrag}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-lightrag}"
      POSTGRES_DATABASE: "${POSTGRES_DATABASE:-lightrag}"
      POSTGRES_VECTOR_INDEX_TYPE: "${POSTGRES_VECTOR_INDEX_TYPE:-HNSW}"
      CHUNK_SIZE: "${CHUNK_SIZE:-1500}"
      CHUNK_OVERLAP_SIZE: "${CHUNK_OVERLAP_SIZE:-150}"
      LLM_TIMEOUT: "${LLM_TIMEOUT:-900}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9621/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - internal

  postgres:
    image: pgvector/pgvector:pg18
    container_name: knowledge-graph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lightrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lightrag}
      POSTGRES_DB: ${POSTGRES_DATABASE:-lightrag}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lightrag}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: knowledge-graph-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      lightrag:
        condition: service_healthy
    environment:
      LIGHTRAG_URL: "http://lightrag:9621"
      KNOWN_FACES_PATH: "/app/known_faces"
      VLM_LLM_BINDING_HOST: "http://host.docker.internal:8080"
      VLM_LLM_MODEL: "${VLM_LLM_MODEL:-Gemma-4-12B-OBLITERATED-Q4_K_M}"
      VLM_LLM_BINDING_API_KEY: "${VLM_LLM_BINDING_API_KEY:-llama-server}"
      FACE_DETECTOR_BACKEND: "${FACE_DETECTOR_BACKEND:-mtcnn}"
      FACE_ATTRIBUTES: "${FACE_ATTRIBUTES:-age,gender,emotion}"
      DATABASE_URL: "postgresql://lightrag:lightrag@postgres:5432/lightrag"
    volumes:
      - ./known_faces:/app/known_faces:rw
      - ./inputs:/app/inputs
      - face_crops:/app/face_crops
      - deepface_weights:/root/.deepface
    ports:
      - "${API_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: ${API_MEMORY_LIMIT:-8g}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - internal

  nexus:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: knowledge-graph-nexus
    restart: unless-stopped
    environment:
      LLAMA_HOST: "${LLAMA_HOST:-host.docker.internal}"
    ports:
      - "${NEXUS_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
      lightrag:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  lightrag_data:
  postgres_data:
  deepface_weights:
  face_crops:
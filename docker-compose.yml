# ═══════════════════════════════════════════════════════════════════════════════
# Knowledge Graph — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
# Usage:
#   docker compose up -d          — start full stack
#   docker compose logs -f        — follow logs
#   docker compose down           — stop
#
# Prerequisites:
#   1. Copy .env.example to .env and customize
#   2. llama-server processes running on host (ports 8080, 8081, 8082)
#
# Storage:
#   PostgreSQL for KV, Vector, and DocStatus stores.
#   NetworkX for Graph storage (no AGE extension needed).
#   To switch to file-based storage, remove the LIGHTRAG_*_STORAGE vars
#   from .env and the defaults (JsonKVStorage, NanoVectorDBStorage, etc.) apply.
# ═══════════════════════════════════════════════════════════════════════════════

services:
  lightrag:
    build:
      context: ./lightrag
      dockerfile: Dockerfile
    container_name: knowledge-graph-lightrag
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${LIGHTRAG_PORT:-9621}:9621"
    volumes:
      - lightrag_data:/app/data
      - ./lightrag/.env:/app/.env:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      PROMPT_DIR: "/app/data/prompts"
      HOST: "0.0.0.0"
      PORT: "9621"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9621/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - internal

  postgres:
    image: pgvector/pgvector:pg18
    container_name: knowledge-graph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lightrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lightrag}
      POSTGRES_DB: ${POSTGRES_DATABASE:-lightrag}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lightrag}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: knowledge-graph-api
    restart: unless-stopped
    depends_on:
      lightrag:
        condition: service_healthy
    environment:
      LIGHTRAG_URL: "http://lightrag:9621"
      KNOWN_FACES_PATH: "/app/known_faces"
    volumes:
      - ./known_faces:/app/known_faces:ro
      - ./inputs:/app/inputs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - internal

  nexus:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: knowledge-graph-nexus
    restart: unless-stopped
    environment:
      LLAMA_HOST: "${LLAMA_HOST:-host.docker.internal}"
    ports:
      - "${NEXUS_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
      lightrag:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  lightrag_data:
  postgres_data:
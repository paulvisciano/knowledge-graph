server {
    listen 3000;
    server_name _;

    # Base64-encoded images in chat completions and image processing payloads
    # can be 5-20 MB. Default nginx client_max_body_size is 1M (413 error).
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # Cache-bust: never cache index.html, aggressively cache hashed assets
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /_app/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Knowledge Graph API (FastAPI) ────────────────────────────────────────
    location /api/kg/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ─── LightRAG API ─────────────────────────────────────────────────────────
    location /api/lightrag/ {
        proxy_pass http://lightrag:9621/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ─── MCP (Model Context Protocol) ──────────────────────────────────────────
    # The MCP server is its own container (knowledge-graph-mcp:9653), not mounted
    # on the FastAPI api. It speaks streamable-http: POST with Accept headers is
    # required; a plain GET returns 406 (expected, not an error condition).
    location /mcp {
        proxy_pass http://knowledge-graph-mcp:9653;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── Sync (conversation persistence) ──────────────────────────────────────
    location /api/sync/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ─── llama-server (LLM, embeddings, reranker) ────────────────────────────
    location /v1/ {
        proxy_pass http://${LLAMA_HOST}:8080/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location /health {
        proxy_pass http://${LLAMA_HOST}:8080/health;
    }

    location /slots {
        proxy_pass http://${LLAMA_HOST}:8080/slots;
    }

    # ─── Whisper transcription server (host, Metal GPU) ─────────────────────────
    location /whisper/ {
        proxy_pass http://${WHISPER_HOST}:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}